services:

  # ── SFTP (accès fichiers uploads) ────────────────────────────────────────────
  sftp:
    image: atmoz/sftp:latest
    container_name: fansub_sftp
    restart: unless-stopped
    ports:
      - "2112:22"
    volumes:
      - backend_uploads:/home/${SFTP_USER:-chuushin}/uploads
    environment:
      SFTP_USERS: "${SFTP_USER:-chuushin}:${SFTP_PASSWORD}:1001"
    networks:
      - fansub_net

  # ── Base de données ──────────────────────────────────────────────────────────
  mongo:
    image: mongodb/mongodb-community-server:4.4-ubuntu2204-slim
    container_name: fansub_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - fansub_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Backend ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fansub_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/fansub
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - fansub_net

  # ── Frontend (Caddy) ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fansub_frontend
    restart: unless-stopped
    environment:
      - SITE_DOMAIN=${SITE_DOMAIN:-http://localhost}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - fansub_net

# ── Volumes & réseau ─────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  fansub_net:
    driver: bridge
