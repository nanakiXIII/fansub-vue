services:

  # ── Base de données ──────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: fansub_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - fansub_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Backend ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fansub_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/fansub
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - fansub_net

  # ── Frontend (nginx) ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fansub_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - fansub_net

# ── Volumes & réseau ─────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  fansub_net:
    driver: bridge
