# Bots de prévisualisation de liens (Discord, Twitter/X, Facebook, Slack...) — ils ne
# rendent pas le JS donc ne voient jamais les balises posées par useSeo.js côté client.
map $http_user_agent $is_preview_bot {
    default 0;
    ~*discordbot         1;
    ~*twitterbot         1;
    ~*facebookexternalhit 1;
    ~*facebot            1;
    ~*slackbot           1;
    ~*telegrambot        1;
    ~*whatsapp           1;
    ~*linkedinbot        1;
    ~*pinterest          1;
    ~*redditbot          1;
    ~*skypeuripreview    1;
    ~*vkshare            1;
    ~*tumblr             1;
    ~*viber              1;
    ~*embedly            1;
    ~*w3c_validator      1;
    ~*flipboard          1;
    ~*line/              1;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA — toutes les routes inconnues renvoient index.html
    location / {
        # Bots détectés ci-dessus → backend, qui sert du HTML avec les bonnes meta Open
        # Graph (titre, synopsis, image) déjà remplies pour la page demandée.
        # Cf. backend/src/routes/preview.js.
        if ($is_preview_bot) {
            rewrite ^(.*)$ /_preview$1 break;
            proxy_pass http://backend:3000;
        }
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy — API REST
    location /api/ {
        proxy_pass         http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Reverse proxy — fichiers uploadés (avatars, images d'actu)
    location /uploads/ {
        proxy_pass         http://backend:3000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Reverse proxy — fichiers médias (vidéos, MEDIA_ROOT)
    location /media/ {
        proxy_pass         http://backend:3000/media/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Reverse proxy — WebSocket Socket.io
    location /socket.io/ {
        proxy_pass         http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Cache agressif pour les assets versionnés (Vite hash)
    location ~* \.(js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
