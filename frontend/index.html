<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FansubZen</title>
    <!-- Anti-FOUC : applique data-layout/data-theme avant le premier paint,
         évite le flash blanc → sombre au rechargement en thème Gundam -->
    <script>
      (function () {
        var bg = { braise: 'rgb(15,15,19)', ametiste: 'rgb(18,15,26)', abysses: 'rgb(10,18,26)', sakura: 'rgb(23,15,20)', air: 'rgb(19,21,28)' };
        function gc(n) { var m = document.cookie.match(new RegExp('(?:^|; )' + n + '=([^;]*)')); return m ? decodeURIComponent(m[1]) : ''; }
        var layout = gc('layout'), theme = gc('theme'), el = document.documentElement;
        if (layout) el.setAttribute('data-layout', layout);
        if (theme)  el.setAttribute('data-theme',  theme);
        el.style.backgroundColor = bg[theme] || bg.braise;
      })();
    </script>
    <!-- SEO — meta de base -->
    <meta name="description" content="Chuushin No Fansub — Sous-titres anime en français par la communauté" />
